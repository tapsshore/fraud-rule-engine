spring:
  application:
    name: fraud-rule-engine

  jpa:
    open-in-view: false

server:
  port: 8080

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Fraud rule defaults
fraud:
  rules:
    high-amount:
      threshold: 50000
    cross-border:
      local-currencies: ZAR
